<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Blog preview card</title>
</head>
<body>
  <div class="card">
    <img src="assets/images/illustration-article.svg" alt="ilustracion de tarjeta previa del blog" width="336px" height="200px" class="img-card">
    <main>
      <span>Learning</span>
      <p class="date">Published 21 Dec 2023</p>
      <h1> HTML & CSS foundations</h1>
      <p class="content">These languages are the backbone of every website, defining structure, content, and presentation. </p>
    </main>
    <div class="author">
        <img src="assets/images/image-avatar.webp" alt="avatar de author de blog" width="32px" height="32px">
        <span>Greg Hooper</span>
      </div>
  </div> 
</body>
</html>
